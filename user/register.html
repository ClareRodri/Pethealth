<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="keywords" content="Veterinaria, Mascotas, Servicios, PetHealt" />
        <meta name="description" content="Landing page aplicación pethealth" />
        
        <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca&family=Noto+Sans+JP:wght@300;400&display=swap"
            rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;1,300&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="../css/style.css">
        <title>PetHealt</title>
    </head>

    <body>
        <header>
            <nav class="navbar navbar-expand-md">
                <div class="container">
                    <a class="navbar-brand abs logo" href="/">
                        <img class="logo__image" src="../images/logo.svg" alt="logo">
                    </a>
                    <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse"
                        data-bs-target="#collapseNavbar">
                        <i class="fa fa-bars" aria-hidden="true"></i>
                    </button>
                    <div class="navbar-collapse collapse" id="collapseNavbar">
                        <ul class="navbar-nav ms-auto navbar">
                            <li class="nav-item navbar__item">
                                <div class="dropdown">
                                    <button class="btn nav-link navbar__link dropdown-toggle" type="button" id="dropdownMenu2"
                                        data-bs-toggle="dropdown" aria-expanded="false">
                                        Conocenos
                                    </button>
                                    <ul class="dropdown-menu" aria-labelledby="dropdownMenu2">
                                        <li><a href="../team/contact.html" class="dropdown-item">Nuestro equipo</a></li>
                                    </ul>
                                </div>
                            </li>
                            <li class="nav-item navbar__item">
                                <a class="nav-link navbar__link navbar__link--active" href="#"
                                    data-bs-toggle="modal">Registrate</a>
                            </li>
                            <li class="nav-item navbar__item">
                                <a class="nav-link navbar__link" href="" data-bs-target="#exampleModal"
                                    data-bs-toggle="modal">Iniciar sesión</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>
        <main>
            <div class="container">
                <h1 class="text-center">Se parte de nuestra comunidad, Registrate!</h1>
                <div class="row m-5">
                    <div class="col-md-6 mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Primer nombre *</label>
                        <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="name@example.com">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Segundo nombre</label>
                        <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="name@example.com">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Primer apellido *</label>
                        <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="name@example.com">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Segundo apellido</label>
                        <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="name@example.com">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Genero *</label>
                        <select class="form-select" aria-label="Default select example">
                            <option selected>SELECCIONE..</option>
                            <option value="1">Femenino</option>
                            <option value="2">Masculino</option>
                            <option value="3">No definido</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div class="text-center">
                        <a href="../index.html" class="btn btn-pet-secondary btn-block text-uppercase">Regresar</a>
                        <button class="btn btn-pet-primary btn-block text-uppercase" type="submit">Registrate</button>
                    </div>
                </div>
            </div>
            <!-- Modal -->
            <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal modal-content modal-transparent ">
                        <div class="modal-body modal__body">
                            <div class="row">
                                <div class="col-md-8 mx-auto">
                                    <div class="card card-signin my-5">
                                        <div class="card-body">
                                            <h5 class="card-title text-center">Sign In</h5>
                                            <form class="form-signin">
                                                <div class="form-label-group">
                                                    <input type="email" id="inputEmail" class="form-control"
                                                        placeholder="Email address" required autofocus>
                                                    <label for="inputEmail">Correo electrónico</label>
                                                </div>

                                                <div class="form-label-group">
                                                    <input type="password" id="inputPassword" class="form-control"
                                                        placeholder="Password" required>
                                                    <label for="inputPassword">Contraseña</label>
                                                </div>

                                                <div class="custom-control custom-checkbox mb-3">
                                                    <input type="checkbox" class="custom-control-input" id="customCheck1">
                                                    <label class="custom-control-label" for="customCheck1">Recordar
                                                        contraseña</label>
                                                </div>
                                                <div class="text-center">
                                                    <button type="button"
                                                        class="btn btn-pet-secondary btn-block text-uppercase"
                                                        data-bs-dismiss="modal">Cerrar</button>
                                                    <button class="btn btn-pet-primary btn-block text-uppercase"
                                                        type="submit">Iniciar sesión</button>
                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <hr>
            <div class="container">
                <div class="row">
                    <div class="d-block">© 2021 Postclick, Inc. All Rights Reserved.</div>
                </div>
                <div class="footer">
                    <div class="footer__column">
                        <h4 class="footer__column--title">Productos</h4>
                        <ul class="footer__column--menu">
                            <li class="footer__column--option">
                                <a href="/" class="v7-btn-flat-black">
                                    <span>Landing Pages</span>
                                </a>
                            </li>
                            <li class="footer__column--option">
                                <a href="../team/contact.html" class="v7-btn-flat-black">
                                    <span>Equipo pethealth</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-JEW9xMcG8R+pH31jmWH6WWP0WintQrMb4s7ZOdauHnUtxwoG2vI5DkLtS3qm9Ekf"
            crossorigin="anonymous"></script>
    </body>

</html>
